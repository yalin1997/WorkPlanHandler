# M6-1:CI(GitHub Actions)——pytest + ruff,核心與完整 extras 分離驗證。
#
# 設計對應 docs/phase2/00 §4.1:
#   - lint:ruff check + format --check(D12 工程基線)。
#   - core:只裝 .[dev](核心零依賴 D9),跑 pytest -m "not slow";
#           langgraph/llm 測試以 pytest.importorskip 自動 skip——證明純核心可獨立運作。
#   - full:裝 .[langgraph,llm,dev],跑全套(adapter + LLM 元件以 stub 離線測,不燒 key)。
# 真 LLM 連線(燒 key)屬 M6-3,刻意不放 CI。
name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv
      - run: uv pip install -e ".[dev]"
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python ${{ matrix.python-version }}
      - run: uv pip install -e ".[dev]"
      - name: pytest(純核心,extras 測試自動 skip)
        run: uv run pytest -q -m "not slow"

  full:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python ${{ matrix.python-version }}
      - run: uv pip install -e ".[langgraph,llm,dev]"
      - name: pytest(完整 extras,含 adapter 與 LLM stub 測試)
        run: uv run pytest -q -m "not slow"
